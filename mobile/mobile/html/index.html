<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sorteador de Lista</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/styles.css"/>
</head>
<body>
  <div class="container">
    <!-- Cabeçalho -->
    <header>
      <h1 class="titulo">Sorteador de Lista</h1>
    </header>

    <!-- Cabeçalho com dados da empresa -->
    <div id="cabecalho-dados" class="margin botton-4">
      <div class="text">
        <div class="spinner" role="status"></div>
        <p class="texto-carregar">Carregando informações da empresa...</p>
      </div>
    </div>

    <!-- Formulário -->
    <div class="form-container">
      <form id="cadastroForm">
        <div class="mb-3">
          <label for="nome" class="form-label">Nome:</label>
          <input type="text" class="form-control" id="nome" placeholder="Digite seu nome" required />
        </div>
        <div class="mb-3">
          <label for="equipe" class="form-label">Equipe:</label>
          <input type="text" class="form-control" id="equipe" placeholder="Digite sua equipe" required />
        </div>
        <div class="mb-3">
          <label for="supervisao" class="form-label">Supervisão:</label>
          <input type="text" class="form-control" id="supervisao" placeholder="Digite sua supervisão" required />
        </div>
        <button type="submit" class="btn btn-primary btn-custom">Enviar</button>
        <button type="reset" class="btn btn-primary btn-custom">Apagar</button>
      </form>
    </div>

    <!-- Modal de sucesso -->
    <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Sucesso!</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">Dados enviados com sucesso!</div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // CONEXAO com o backend:
    //foi adicionado a função para enviar dados ao backend.
    async function enviarCadastro(dados) {
      try {
        const resposta = await fetch("http://192.168.0.10:3000/cadastro", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(dados),
        });

        if (!resposta.ok) throw new Error("Erro ao enviar para o servidor");
        return true;
      } catch (erro) {
        console.error("Erro:", erro);
        return false;
      }
    }

    // modificada a função de envio do formulário com integração real com o backend
    document.addEventListener("DOMContentLoaded", function () {
      carregarCabecalho(); // Mantido

      document.getElementById("cadastroForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const dados = {
          nome: document.getElementById("nome").value.trim(),
          equipe: document.getElementById("equipe").value.trim(),
          supervisao: document.getElementById("supervisao").value.trim(),
        };

        if (dados.nome && dados.equipe && dados.supervisao) {
          const sucesso = await enviarCadastro(dados);

          if (sucesso) {
            const myModal = new bootstrap.Modal(document.getElementById("successModal"));
            myModal.show();
            e.target.reset();
          } else {
            alert("Erro ao enviar os dados. Tente novamente.");
          }
        } else {
          alert("Preencha todos os campos obrigatórios.");
        }
      });
    });

    // Função para carregar dados da empresa
    async function carregarCabecalho() {
      try {
        const response = await fetch("http://127.0.0.1:3000/cabecalho-dados"); // Alterado para o endpoint real
        if (!response.ok) throw new Error(`Erro na requisição: ${response.status}`);
        const dados = await response.json();

        const dataFormatada = new Date(dados.data).toLocaleDateString("pt-BR");

        document.getElementById("cabecalho-dados").innerHTML = `
          <h4>${dados.empresa}</h4>
          <p><strong>Empreendimento:</strong> ${dados.empreendimento}</p>
          <p><strong>Data:</strong> ${dataFormatada}</p>
          <p><strong>Período:</strong> ${dados.periodo}</p>
        `;
      } catch (error) {
        console.error("Erro ao carregar dados:", error);
        document.getElementById("cabecalho-dados").innerHTML = `
          <div class="alert alert-warning">
            Não foi possível carregar os dados. ${error.message}
          </div>
        `;
      }
    }
  </script>
</body>
</html>
