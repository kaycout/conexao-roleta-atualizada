<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteador de Lista</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

    <div id="topo-fixo">
        <label>Empresa: <input type="text" id="empresa"></label>
        <label>Empreend/Loja/Dep: <input type="text" id="empreendimento"></label>
        <label>Data: <input type="date" id="data"></label>
        <label>Período:
            <input type="radio" name="periodo" value="Manhã"> Manhã
            <input type="radio" name="periodo" value="Tarde"> Tarde
            <input type="radio" name="periodo" value="Integral"> Integral
        </label>
        <button onclick="criarRoleta()">Criar Roleta</button>
    </div>

    <div id="conteudo">
        <div class="coluna">
            <h3>Lista Original</h3>
            <table id="tabelaOriginal">
                <thead>
                    <tr><th>#</th>
                    <th>Nome</th>
                    <th>Equipe</th>
                    <th>Supervisão</th>
                    <th>Remover</th>
                    </tr>
                </thead>
                <tbody id="listaOriginal"></tbody>
            </table>
        </div>

        <div class="coluna" id="centro-fixo">
            <div id="participantes">
                <label><br>Nome: <input type="text" id="nome" placeholder="Digite seu nome"></label><br>
                <label>Equipe: <input type="text" id="equipe" placeholder="Qual a sua equipe?"></label><br>
                <label>Supervisão: <input type="text" id="supervisao" placeholder="Informe sua supervisão"></label><br>
                <button onclick="adicionar()">Adicionar</button>
            </div><br>
            <div id="qr-code-container"></div>
            <button onclick="sortear()">Sortear</button>
            <div id="contador" class="contador">5</div>
        </div>

        <div class="coluna">
            <h3>Lista Sorteada</h3>
            <table id="tabelaSorteada">
                <thead>
                    <tr><th>#</th><th>Nome</th><th>Equipe</th><th>Supervisão</th></tr>
                </thead>
                <tbody id="listaSorteada"></tbody>
            </table>
            <button onclick="salvarPDF()">Salvar como PDF</button>
        </div>
    </div>
    <script src="teste.js"></script>
    <script src="script.js"></script>

    <footer>
        <div class="banner" id="anuncio"></div>
        <h1>ANÚNCIO AQUI</h1>
    </footer>

</body>



</html>
